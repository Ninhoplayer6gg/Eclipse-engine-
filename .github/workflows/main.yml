name: Build Eclipse Engine Libs

on:
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mkxp-z
        uses: actions/checkout@v4
        with:
          repository: mkxp-z/mkxp-z
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build pkg-config

      - name: Setup Android NDK
        # Usamos o caminho padrão das máquinas ubuntu-latest do GitHub
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk-bundle" >> $GITHUB_ENV

      - name: Compile for armeabi-v7a (Moto G22)
        run: |
          # Otimização específica para o seu processador
          meson setup builddir \
            --cross-file cross/android-armv7.txt \
            -Duse_ffmpeg=false \
            -Duse_nuklear=true \
            -Dbuildtype=release
          ninja -C builddir

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-engine-libs-armv7
          path: builddir/*.so
          
