name: Build Eclipse Engine Libs

on:
  workflow_dispatch: 

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mkxp-z
        uses: actions/checkout@v4
        with:
          repository: mkxp-z/mkxp-z
          submodules: recursive

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build pkg-config

      - name: Create Cross-File (Fixed Deprecation)
        run: |
          mkdir -p cross
          cat <<EOF > cross/android-armv7.txt
          [binaries]
          c = '$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang'
          cpp = '$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang++'
          ar = '$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar'
          strip = '$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip'
          # Corrigido de pkgconfig para pkg-config como sugerido pelo log
          pkg-config = '/usr/bin/false'

          [host_machine]
          system = 'android'
          cpu_family = 'arm'
          cpu = 'armv7a'
          endian = 'little'
          EOF

      - name: Compile for armeabi-v7a
        run: |
          # Otimização: -Dwrap_mode=forcefallback baixa as dependências que faltam (PhysFS, etc)
          meson setup builddir \
            --cross-file cross/android-armv7.txt \
            --wrap-mode=forcefallback \
            -Dbuildtype=release \
            -Doptimization=s
          ninja -C builddir

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-engine-libs-armv7
          path: builddir/*.so
          
